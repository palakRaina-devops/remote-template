template:
  name: Gatling Testing
  identifier: CD_Stage_Gatling_Test
  type: Stage
  description: |-
    Gatling Performance tests using Gradle and reports will be published to GCS bucket.
    HEHEHEE
  tags:
    owning_platform: Everyday Banking Platform
    owning_lab: EDB-DevOps Team - Run & Change Lab
    snow_group: IT.DIGITAL.EDB
    documentation_link: https://lbg.atlassian.net/wiki/x/-p7iJg
    deprecation_date: live
    expiry_date: live
  icon: data:image/jpeg;base64,
  spec:
    type: Custom
    spec:
      execution:
        steps:
          - stepGroup:
              name: StepGroup_CI_StepGroup_OIDC_Token_Generation
              identifier: StepGroup_CI_StepGroup_OIDC_Token_Generation
              template:
                templateRef: account.CD_StepGroup_OIDC_Token_Generation
                versionLabel: v2.0.1
                templateInputs:
                  variables:
                    - name: ENVIRONMENT_ID
                      type: String
                      value: <+input>.default(pre).allowedValues(pre,prod,rtl,int)
                    - name: GCP_SERVICE_ACCOUNT_EMAIL
                      type: String
                      value: <+input>.regex(^[ \t\r\n]*[A-Za-z0-9][A-Za-z0-9._%+\-]*@[a-z][a-z0-9\-]*[.]iam[.]gserviceaccount[.]com[ \t\r\n]*$)
                    - name: CREATE_CRED_FILE
                      type: String
                      value: <+input>.default(false).allowedValues(false,true)
            contextType: StageTemplate
          - stepGroup:
              name: Gatling Test
              identifier: Gatling_Test
              steps:
                - step:
                    type: GitClone
                    name: Git Clone
                    identifier: Git_Clone
                    spec:
                      connectorRef: account.github_enterprise_cloud_green
                      repoName: <+input>
                      cloneDirectory: /harness/
                      build: <+input>
                - step:
                    type: Run
                    name: Gradle Init
                    identifier: Gradle_Init
                    spec:
                      connectorRef: account.gcp_rtl_ssv_gar_ro_gsa
                      image: europe-docker.pkg.dev/ssv-rtl-devops-registry-624/release/docker.io/gradle:<+stage.variables.GRADLE_VERSION>
                      shell: Sh
                      command: |-
                        #!/bin/sh

                        if [ "<+stage.variables.NEXUS_REGISTRY_VERSION>" = "staging" ]; then
                            NEXUS_SNAPSHOT_REPOSITORY_URL="https://artefacts.lloydsbanking.cloud/repository/<+stage.variables.NEXUS_REGISTRY_VISIBILITY>-<+org.identifier>_<+project.identifier>-maven-snapshot-staging"
                            NEXUS_RELEASE_REPOSITORY_URL="https://artefacts.lloydsbanking.cloud/repository/<+stage.variables.NEXUS_REGISTRY_VISIBILITY>-<+org.identifier>_<+project.identifier>-maven-release-staging"
                        fi

                        if [ "<+stage.variables.NEXUS_REGISTRY_VERSION>" = "release" ]; then
                            NEXUS_SNAPSHOT_REPOSITORY_URL="https://artefacts.lloydsbanking.cloud/repository/<+stage.variables.NEXUS_REGISTRY_VISIBILITY>-<+org.identifier>_<+project.identifier>-maven-snapshot"
                            NEXUS_RELEASE_REPOSITORY_URL="https://artefacts.lloydsbanking.cloud/repository/<+stage.variables.NEXUS_REGISTRY_VISIBILITY>-<+org.identifier>_<+project.identifier>-maven-release"
                        fi

                            echo "Release URL: $NEXUS_RELEASE_REPOSITORY_URL"
                            echo "Snapshot URL: $NEXUS_SNAPSHOT_REPOSITORY_URL"

                        # Create the init.gradle file with the necessary repository URLs and credentials
                        cat <<EOF > init.gradle
                        // Repository URLs
                        def SARPrivateMavenSnapshotUrl = "${NEXUS_SAR_PRIVATE_MAVEN_SNAPSHOT_URL}"
                        def SARPrivateMavenReleaseUrl = "${NEXUS_SAR_PRIVATE_MAVEN_RELEASE_URL}"
                        def SARInnerSourceMavenSnapshotUrl = "${NEXUS_SAR_INNERSOURCE_MAVEN_SNAPSHOT_URL}"
                        def SARInnerSourceMavenReleaseUrl = "${NEXUS_SAR_INNERSOURCE_MAVEN_RELEASE_URL}"
                        def SARGradleUrl = "${NEXUS_SAR_GRADLE_URL}"
                        def SARMavenUrl = "${NEXUS_SAR_MAVEN_URL}"
                        def SARMavenSnapshot = "${SAR_MAVEN_SNAPSHOT_URL}"
                        def SARMavenStaging = "${SAR_MAVEN_STAGING_URL}"
                        def SAR_Reader_Name = "${NEXUS_SAR_READER_NAME}"
                        def SAR_Reader_Pass = "${NEXUS_SAR_READER_PASS}"

                        // Set system properties for HTTP timeouts
                        System.setProperty('org.gradle.internal.http.connectionTimeout', '60000') // 1 minute
                        System.setProperty('org.gradle.internal.http.socketTimeout', '1800000') // 30 minutes
                        // Function to configure repositories
                        def configureRepositories = { repoHandler ->
                            {
                              repoHandler.maven {
                                  url = uri(SARMavenUrl)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARGradleUrl)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARMavenSnapshot)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARMavenStaging)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARInnerSourceMavenReleaseUrl)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARInnerSourceMavenSnapshotUrl)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARPrivateMavenSnapshotUrl)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                              repoHandler.maven {
                                  url = uri(SARPrivateMavenReleaseUrl)
                                  credentials {
                                      username = SAR_Reader_Name
                                      password = SAR_Reader_Pass
                                  }
                              }
                          }
                        }

                        // Ensure only approved plugin repositories are used in settings.gradle
                        settingsEvaluated { settings ->
                            settings.pluginManagement {
                                repositories.clear()
                                repositories(configureRepositories)
                            }
                            settings.buildCache {
                                local {
                                    directory = new File("/harness/.gradle/caches/build-cache")
                                    enabled = true
                                }
                            }
                        }

                        // All projects configuration
                        allprojects {
                            configurations.all {
                                resolutionStrategy {
                                    cacheChangingModulesFor 0, 'seconds'
                                    cacheDynamicVersionsFor 15, 'minutes'
                                }
                            }
                            repositories(configureRepositories)
                                afterEvaluate { project ->
                                def resolvedUrl = rootProject.version.toString().endsWith("-SNAPSHOT") ? "${NEXUS_SNAPSHOT_REPOSITORY_URL}" : "${NEXUS_RELEASE_REPOSITORY_URL}"
                                logger.lifecycle("RESOLVED_REPO_URL= " + resolvedUrl)
                                project.repositories.clear()
                                project.repositories(configureRepositories)
                            }
                        }
                        EOF
                        echo "init.gradle file created successfully."

                        echo "Adding default project name <+pipeline.properties.ci.codebase.repoName> to settings.gradle. Add 'rootProject.name = "yourproject"' entry to source settings.gradle to override..."
                        touch settings.gradle && echo 'rootProject.name = "<+pipeline.properties.ci.codebase.repoName>"' | cat settings.gradle - > temp && mv temp settings.gradle
                      envVariables:
                        NEXUS_SAR_GRADLE_URL: https://artefacts.lloydsbanking.cloud/repository/gradle-osg-proxy/
                        NEXUS_SAR_READER_NAME: <+secrets.getValue("account.nexus_sar_reader_token_name")>
                        NEXUS_SAR_READER_PASS: <+secrets.getValue("account.nexus_sar_reader_token_pass")>
                        NEXUS_SAR_PRIVATE_MAVEN_SNAPSHOT_URL: https://artefacts.lloydsbanking.cloud/repository/private-<+org.identifier>_<+project.identifier>-maven-snapshot-group/
                        NEXUS_SAR_PRIVATE_MAVEN_RELEASE_URL: https://artefacts.lloydsbanking.cloud/repository/private-<+org.identifier>_<+project.identifier>-maven-release-group/
                        NEXUS_SAR_INNERSOURCE_MAVEN_SNAPSHOT_URL: https://artefacts.lloydsbanking.cloud/repository/innersource-<+org.identifier>_<+project.identifier>-maven-snapshot-group/
                        NEXUS_SAR_INNERSOURCE_MAVEN_RELEASE_URL: https://artefacts.lloydsbanking.cloud/repository/innersource-<+org.identifier>_<+project.identifier>-maven-release-group/
                        NEXUS_SAR_MAVEN_URL: https://artefacts.lloydsbanking.cloud/repository/maven-osg-proxy/
                        SAR_MAVEN_SNAPSHOT_URL: https://artefacts.lloydsbanking.cloud/repository/innersource-evbk1_ebblt2-maven-snapshot/
                        SAR_MAVEN_STAGING_URL: https://artefacts.lloydsbanking.cloud/repository/innersource-evbk1_ebblt2-maven-release-staging/
                        GRADLE_VERSION: 8.14.0-jdk17
                - step:
                    type: Run
                    name: Gatling Performance Testing
                    identifier: Gatling_Performance_Testing
                    spec:
                      connectorRef: account.gcp_rtl_ssv_gar_ro_gsa
                      image: europe-docker.pkg.dev/ssv-rtl-devops-registry-624/release/docker.io/gradle:<+stage.variables.GRADLE_VERSION>
                      shell: Sh
                      command: |-
                        #!/bin/bash
                        awk '
                        v{v=v"\n"$0}
                        /----BEGIN/ {v=$0; cert++}
                        /----END/&&v{
                          print v > "tmp.crt"
                          close("tmp.crt")
                          system("keytool -import -noprompt -trustcacerts -alias lloyds-hcvault-ca-"cert" -storepass changeit -cacerts -file tmp.crt")
                          v=x}' /etc/ssl/certs/ca-certificates.crt

                        cat << EOF > root.pem
                        ${ngSecretManager.obtain("account.lbg_preprod_root_ca", -1740076442)}
                        EOF
                        keytool -import -noprompt -trustcacerts -alias lbg-root -storepass changeit -cacerts -file root.pem
                        export ENV_NAME=<+stage.variables.gatling_env>
                        export REPONAME=<+pipeline.stages.Gatling.spec.execution.steps.Gatling_Test.steps.Git_Clone.spec.repoName>
                        export PIPELINE_ID=<+pipeline.executionId>

                        export REPORT_NAME="${ENV_NAME}/${REPONAME}/${PIPELINE_ID}"
                        export REPORT_PATH="/harness/build/reports/gatling"
                        env
                        gradle --version

                        gradle clean gatlingRun --exclude-task test --info --no-daemon --build-cache --init-script ./init.gradle


                        echo "Gatling Path: ${REPORT_NAME}"
                        # export TARBALL_NAME="<+pipeline.properties.ci.codebase.repoName>-<+pipeline.executionId>.tar.gz"

                        # echo "Report Name: ${REPORT_NAME} Report Path: ${REPORT_PATH} Tar: ${TARBALL_NAME} ENV_NAME: ${ENV_NAME}"

                        # tar -zcvf $TARBALL_NAME -C /harness/build/reports gatling
                        ls -lrt
                      reports:
                        type: JUnit
                        spec:
                          paths:
                            - "**/*.xml"
                      envVariables:
                        NEXUS_SAR_READER_NAME: <+secrets.getValue("account.nexus_sar_reader_token_name")>
                        NEXUS_SAR_READER_PASS: <+secrets.getValue("account.nexus_sar_reader_token_pass")>
                        SARRawUrl: https://artefacts.lloydsbanking.cloud/repository/innersource-evbk1_ebblt2-raw/gradle
                      outputVariables:
                        - name: REPORT_PATH
                          type: String
                          value: REPORT_PATH
                        - name: REPORT_NAME
                          type: String
                          value: REPORT_NAME
                - step:
                    type: Run
                    name: Upload Report
                    identifier: Run_3
                    spec:
                      connectorRef: account.gcp_rtl_ssv_gar_ro_gsa
                      image: europe-docker.pkg.dev/ssv-rtl-devops-registry-624/release/hxkxmfkerhkxktic/gtxsdmgdiqsxcmqv/null/images/gcloud-sdk-non-root:v0.20.0
                      shell: Sh
                      command: |-
                        #!/bin/bash
                        GREEN='\033[1;32m'
                        NC='\033[0m' # No Color (Reset)
                        ls -lrt
                        TARBALL_NAME="<+pipeline.stages.Gatling.spec.execution.steps.Gatling_Test.steps.Git_Clone.spec.repoName>-<+pipeline.executionId>.tar.gz"
                        echo "REPORT_PATH: ${REPORT_PATH}"

                        gcloud config set project <+stage.variables.PROJECT_ID>

                        echo "Uploading ${REPORT_PATH} → gs://${BUCKET}/${PATH_TO_UPLOAD}/${REPORT_NAME}/ ..."

                        tar -czvf "$TARBALL_NAME" \
                          -C "$(dirname "$REPORT_PATH")" \
                          "$(basename "$REPORT_PATH")"

                        gcloud storage cp -r \
                          "$TARBALL_NAME" \
                          gs://${BUCKET}/${PATH_TO_UPLOAD}/${REPORT_NAME}/

                        echo "Listing the uploaded path..."

                        gcloud storage ls \
                          gs://${BUCKET}/${PATH_TO_UPLOAD}/${REPORT_NAME}/

                        echo -e "\033[1m Download the ${REPORT_NAME} archive to your current folder with the below command: \033[0m"
                        echo -e "${GREEN}gcloud storage cp gs://${BUCKET}/${PATH_TO_UPLOAD}/${REPORT_NAME}/${TARBALL_NAME} .${NC}"
                      envVariables:
                        PATH_TO_UPLOAD: <+stage.variables.PATH_TO_UPLOAD>
                        REPORT_PATH: <+pipeline.stages.Gatling.spec.execution.steps.Gatling_Test.steps.Gatling_Performance_Testing.output.outputVariables.REPORT_PATH>
                        REPORT_NAME: <+pipeline.stages.Gatling.spec.execution.steps.Gatling_Test.steps.Gatling_Performance_Testing.output.outputVariables.REPORT_NAME>
                        CLOUDSDK_AUTH_ACCESS_TOKEN: <+pipeline.stages.Gatling.spec.execution.steps.StepGroup_CI_StepGroup_OIDC_Token_Generation.steps.oidc_token_generation.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                        BUCKET: <+stage.variables.BUCKET>
                - step:
                    type: Plugin
                    name: Publish Report Path
                    identifier: Publish_Report_Path
                    spec:
                      connectorRef: account.gcp_rtl_ssv_gar_ro_gsa
                      image: europe-docker.pkg.dev/ssv-rtl-devops-registry-624/release/docker.io/plugins/artifact-metadata-publisher:2.1.0
                      settings:
                        file_urls: <+stage.variables.BUCKET>/<+stage.variables.PATH_TO_UPLOAD>/<+pipeline.stages.Gatling.spec.execution.steps.Gatling_Test.steps.Gatling_Performance_Testing.output.outputVariables.REPORT_NAME>
                        artifact_file: Reports in GCS bucket
              stepGroupInfra:
                type: KubernetesDirect
                spec:
                  connectorRef: account.central_ci
                  volumes: []
                  harnessImageConnectorRef: account.harness_ci_addon_rtl
    variables:
      - name: BUCKET
        type: String
        description: |
          GCS bucket name (e.g. my-bucket). Leave blank to skip upload.
        required: false
        value: <+input>
      - name: PROJECT_ID
        type: String
        description: GCP project ID (e.g. wrk-pre-wrk01-svp-6aa32f)
        required: false
        value: <+input>
      - name: PATH_TO_UPLOAD
        type: String
        description: Path prefix in your bucket where reports will be uploaded (e.g. Gatling-Reports)
        required: false
        value: <+input>
      - name: GRADLE_VERSION
        type: String
        description: Version of Gradle. Default version - 8.14.0-jdk17. Available versions - 8.14.0-jdk17, 8.14.0-jdk21, 8.14.0-jdk24.
        required: false
        value: <+input>.default(8.14.0-jdk17).allowedValues(8.14.0-jdk17,8.14.0-jdk21,8.14.0-jdk24)
      - name: gatling_env
        type: String
        description: Gatling Environment
        required: false
        value: <+input>.default(DEV).allowedValues(DEV,INT,PRE,PROD)
  versionLabel: v2.x.x
